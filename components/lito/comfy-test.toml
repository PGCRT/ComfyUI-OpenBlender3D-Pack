[test]
levels = ["syntax", "install", "registration", "instantiation", "execution"]
publish = true

[test.workflows]
# LiTo is image → 3D Gaussian splat (Apple ICLR 2026); the basic workflow
# loads a DiT + decodes ~524k Gaussians, so it only runs on GPU. The CPU
# rows of the matrix skip it via the `!basic` exclusion. Bump timeout
# above the comfy-test default since first-run includes a ~3 GB model
# download from Apple's CDN before the ~5s sampling on H100.
timeout = 600
cpu = ["!basic"]
gpu = ["basic"]

[test.platforms]
linux = false
macos = false
windows = false
windows_portable = false
linux_gpu = true
windows_gpu = true
windows_portable_gpu = true
macos_desktop = false
windows_desktop = false
windows_desktop_gpu = true
